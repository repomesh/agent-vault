dockers:
  - id: amd64
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "infisical/agent-vault:{{ .Version }}-amd64"
    build_flag_templates:
      - "--platform=linux/amd64"
    extra_files:
      - scripts/docker-entrypoint.sh

  - id: arm64
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile.goreleaser
    use: buildx
    image_templates:
      - "infisical/agent-vault:{{ .Version }}-arm64"
    build_flag_templates:
      - "--platform=linux/arm64"
    extra_files:
      - scripts/docker-entrypoint.sh

docker_manifests:
  - name_template: "infisical/agent-vault:{{ .Version }}"
    image_templates:
      - "infisical/agent-vault:{{ .Version }}-amd64"
      - "infisical/agent-vault:{{ .Version }}-arm64"

  - name_template: "infisical/agent-vault:latest"
    image_templates:
      - "infisical/agent-vault:{{ .Version }}-amd64"
      - "infisical/agent-vault:{{ .Version }}-arm64"

release:
  github:
    owner: Infisical
    name: agent-vault
  draft: false
  prerelease: auto
  make_latest: true
  footer: |
    ## Verify

    ```bash
    # Verify checksum (portable across macOS and Linux)
    shasum -a 256 --ignore-missing -c checksums.txt

    # Verify signature (requires cosign v2+)
    cosign verify-blob \
      --bundle checksums.txt.sig \
      --certificate-identity-regexp "^https://github\.com/Infisical/agent-vault/\.github/workflows/release\.yml@refs/tags/" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      checksums.txt

    # Verify Docker image signature (requires cosign)
    cosign verify infisical/agent-vault:{{ .Version }} \
      --certificate-identity-regexp "^https://github\.com/Infisical/agent-vault/\.github/workflows/release\.yml@refs/tags/" \
      --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
    ```
